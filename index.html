<!DOCTYPE html>

<head>

    <title>Escolha um nome criativo</title>

</head>

<body>

        <h1>Crie um nome para sua página</h1>

                background-color: DarkSlateBlue;

            main {

                color: Ivory;

    <main>

        <img src="entregue.png"
            alt="Pessoa atribulada com trabalhos para entregar">
